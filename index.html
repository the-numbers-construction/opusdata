<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpusData - Under Maintenance</title>
    <meta name="description" content="OpusData is temporarily under maintenance. We'll be back soon with movie data API services.">
    
    <!-- Open Graph - OpusData -->
    <meta property="og:title" content="OpusData - Under Maintenance">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://opusdata.com">
    <meta property="og:description" content="OpusData movie data API temporarily under maintenance">
    <meta property="og:image" content="/opusdata-logo.jpg">
    <meta property="og:site_name" content="OpusData">
    
    <!-- CDN Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #ffffff; 
            color: #333;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .maintenance-container { 
            max-width: 600px; 
            text-align: center;
            padding: 40px 20px;
        }
        .slogan { 
            font-size: 2.5rem; 
            font-weight: 700; 
            color: #B3181D; 
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .maintenance-title { 
            font-size: 2rem; 
            color: #B3181D;
            margin-bottom: 15px;
        }
        .maintenance-text { 
            font-size: 1.2rem; 
            color: #555;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .social-links { margin: 30px 0; }
        .social-links a { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 50px; 
            height: 50px; 
            margin: 0 10px; 
            background: #B3181D; 
            border-radius: 50%; 
            color: white; 
            text-decoration: none; 
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .social-links a:hover { 
            background: #8B0000; 
            transform: translateY(-2px);
        }
        .footer-text {
            opacity: 0.8; 
            font-size: 0.9rem; 
            color: #666;
            margin-top: 30px;
        }
        @media (max-width: 768px) { 
            .slogan { font-size: 2rem; }
            .maintenance-title { font-size: 1.6rem; }
            .maintenance-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <h1 class="slogan">OpusData</h1>
        
        <h2 class="maintenance-title">🚧 Under Maintenance</h2>
        <p class="maintenance-text">
            We're updating our movie data API systems to bring you even better service. 
            We'll be back online shortly with the fastest, easiest, most reliable movie data for your business!
        </p>
        
        <!-- Social Media Links -->
        <div class="social-links">
            <a href="https://www.facebook.com/TheNumbers" target="_blank" title="Facebook" aria-label="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://twitter.com/MovieNumbers" target="_blank" title="Twitter" aria-label="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://www.instagram.com/thenumbersmoviedata/" target="_blank" title="Instagram" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.threads.net/@thenumbersmoviedata" target="_blank" title="Threads" aria-label="Threads">
                <i class="fas fa-comment"></i>
            </a>
        </div>
        
        <p class="footer-text">© OpusData - Movie Data API for Business</p>
    </div>
</body>
</html>
